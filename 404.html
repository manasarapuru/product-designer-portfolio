<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Redirect all 404s back to index with the path as a query param
      var path = window.location.pathname;
      window.location.replace('/?p=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
