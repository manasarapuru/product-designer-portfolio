<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var l = window.location;
      var base = '/product-designer-portfolio';
      var path = l.pathname.slice(base.length) || '/';
      l.replace(base + '/?p=' + encodeURIComponent(path + l.search) + (l.hash ? '&h=' + encodeURIComponent(l.hash.slice(1)) : ''));
    </script>
  </head>
  <body></body>
</html>
